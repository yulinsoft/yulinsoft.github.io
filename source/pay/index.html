<!doctype html> 
<html> 
<head> 
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>平淡如盐收款码</title>    
    <style>
    * {
        margin: 0; padding: 0;
        font-family: Microsoft yahei;
    }
    body {
        background-color: #fff;
    }
    .code-item {
        width: 100%;
        max-width: 400px;
        margin: 0 auto;
        padding-bottom: 1px;
        display: none;
        background-color: #5c92ef;
    }
    .code-title {
        height: 100px;
        background-color: #f2f2f2;
        background-position: center;
        background-repeat: no-repeat;
        background-size: 60%;
    }
    .code-area {
        text-align: center;
    }
    .code-area>img {
        margin: 80px 0;
        width: 60%;
        min-width: 100px;
    }
    .code-footer {
        height: 80px;
        text-align: center;
        background-color: #fff;
        color: #666;
        line-height: 40px;
        font-size: 20px;
        margin: -2px 2px 2px 2px;
    }
    
    #code-all>.code-title {
        background-image: url("img/money.png");
	}
    
    #code-qq {
        background-color: #54b4ef;
    }
    #code-qq>.code-title {
        background-image: url("img/money.png");
	}
    
    #code-wechat {
        background-color: #54bc6e;
    }
    #code-wechat>.code-title { 
        background-image: url("img/money.png");
	}
	
	.money {
        height: 80px;
        text-align: center;
        line-height: 180px;
        font-size: 18px;
        margin: -2px 2px 2px 2px;
    }
    </style>    

</head>
<body>
    <div class="code-item" id="code-all">
        <div class="code-title"><div class="money">本二维码支持以上APP向我付款</div></div>
        <div class="code-area">
            <img id="page-url" src="img/money.png">
        </div>
        <div class="code-footer">扫描或长按以上二维码向我付款<br />Copyright © 2018 平淡如盐</div>
    </div>
    <div class="code-item" id="code-qq">
        <div class="code-title"><div class="money">本二维码支持以上APP向我付款</div></div>
        <div class="code-area">
            <img id="qq-url" src="img/money.png">
        </div>
        <div class="code-footer">扫描或长按以上二维码向我付款<br />Copyright © 2018 平淡如盐</div>
    </div>
    <div class="code-item" id="code-wechat">
        <div class="code-title"><div class="money">本二维码支持以上APP向我付款</div></div>
        <div class="code-area">
            <img id="wechat-url" src="img/money.png">
        </div>
        <div class="code-footer">扫描或长按以上二维码向我付款<br />Copyright © 2018 平淡如盐</div>
    </div>
    
    <script>
    if(navigator.userAgent.match(/Alipay/i)) {
        window.location.href = "HTTPS://QR.ALIPAY.COM/FKX02345OKISCUEBWWXD9B"; 
    } else if(navigator.userAgent.match(/MicroMessenger\//i)) {
        document.getElementById("wechat-url").src = "img/weixin.png";
        document.getElementById("code-wechat").style.display = "block";
    } else if(navigator.userAgent.match(/QQ\//i)) {
        document.getElementById("qq-url").src = "img/qqpay.png";
        document.getElementById("code-qq").style.display = "block";
    } else {
        document.getElementById("page-url").src = "img/pay.png";
        document.getElementById("code-all").style.display = "block";
    }
    </script>

</body>
</html>
